services:
  api:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    container_name: astro-api
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - ASTRO_VAULT_KEY=${ASTRO_VAULT_KEY}
      - LAUNCHER_KEY=${LAUNCHER_KEY}
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - vault-data:/app/config/vault:ro
      - astro-minecraft:/app/minecraft
    networks:
      - astro-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: astro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - astro-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    container_name: astro-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
      - ./certbot-log:/var/log/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  vault-data:
    driver: local
    driver_opts:
      type: none
      device: /opt/astro/vault
      o: bind
  astro-minecraft:
  certbot-www:
  certbot-certs:

networks:
  astro-net:
    driver: bridge
